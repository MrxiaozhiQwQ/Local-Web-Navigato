name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            asset_name: local-web-nav_linux_amd64.tar.gz
            binary_name: local-web-nav
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            asset_name: local-web-nav_linux_arm64.tar.gz
            binary_name: local-web-nav
          - goos: windows
            goarch: amd64
            runner: windows-latest
            asset_name: local-web-nav_windows_amd64.zip
            binary_name: local-web-nav.exe
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            asset_name: local-web-nav_darwin_amd64.tar.gz
            binary_name: local-web-nav
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            asset_name: local-web-nav_darwin_arm64.tar.gz
            binary_name: local-web-nav

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -o "dist/${{ matrix.binary_name }}" .

      - name: Package tar.gz
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          tar -czf "dist/${{ matrix.asset_name }}" -C dist "${{ matrix.binary_name }}"

      - name: Package zip
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.asset_name }}"

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/*/* \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
