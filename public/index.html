<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>本机网页导航</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Local Web Navigator</p>
          <h1>本机网页导航</h1>
        </div>
        <button id="settings-button" class="icon-button" type="button" aria-label="打开设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.14 12.94a7.48 7.48 0 0 0 .05-.94 7.48 7.48 0 0 0-.05-.94l2.03-1.58a.48.48 0 0 0 .11-.61l-1.92-3.32a.49.49 0 0 0-.58-.22l-2.39.96a7.33 7.33 0 0 0-1.63-.94l-.36-2.54a.49.49 0 0 0-.48-.41h-3.84a.49.49 0 0 0-.48.41l-.36 2.54a7.33 7.33 0 0 0-1.63.94l-2.39-.96a.49.49 0 0 0-.58.22L2.72 8.87a.48.48 0 0 0 .11.61l2.03 1.58a7.48 7.48 0 0 0-.05.94 7.48 7.48 0 0 0 .05.94l-2.03 1.58a.48.48 0 0 0-.11.61l1.92 3.32a.49.49 0 0 0 .58.22l2.39-.96c.5.38 1.05.7 1.63.94l.36 2.54a.49.49 0 0 0 .48.41h3.84a.49.49 0 0 0 .48-.41l.36-2.54c.58-.24 1.13-.56 1.63-.94l2.39.96a.49.49 0 0 0 .58-.22l1.92-3.32a.48.48 0 0 0-.11-.61Zm-7.14 2.56A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7Z"/>
          </svg>
        </button>
      </header>

      <main class="content">
        <section class="sites-panel">
          <div id="site-grid" class="site-grid"></div>
          <div id="empty-state" class="empty-state">
            <p>还没有找到网页服务，扫描结果会实时出现在这里。</p>
          </div>
        </section>
      </main>
    </div>

    <div id="settings-modal" class="modal-shell" hidden>
      <div id="settings-backdrop" class="modal-backdrop"></div>
      <section class="modal-card" aria-labelledby="settings-title" aria-modal="true" role="dialog">
        <div class="modal-head">
          <div>
            <p class="eyebrow">Settings</p>
            <h2 id="settings-title">扫描设置</h2>
          </div>
          <button id="settings-close" class="icon-button muted" type="button" aria-label="关闭设置">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18.3 5.71 12 12l6.3 6.29-1.41 1.41L10.59 13.4 4.29 19.7 2.88 18.29 9.17 12 2.88 5.71 4.29 4.29l6.3 6.3 6.29-6.3z"/>
            </svg>
          </button>
        </div>

        <label class="field">
          <span class="field-label">扫描目标</span>
          <input id="target-input" class="target-input" type="text" placeholder="例如 192.168.1.10 或 localhost">
        </label>
        <p id="target-hint" class="target-hint">留空时默认使用当前本机 IP。</p>

        <div class="modal-actions">
          <button id="target-button" class="primary-button" type="button">应用并扫描</button>
          <button id="rescan-button" class="secondary-button" type="button">重新扫描</button>
        </div>
      </section>
    </div>

    <div id="progress-dock" class="progress-dock is-visible">
      <div class="progress-status">
        <span id="status-pill" class="status-pill idle">空闲</span>
        <span id="scan-phase" class="dock-phase">准备中</span>
      </div>
      <div class="dock-progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <p id="progress-text" class="dock-progress-text">准备中</p>
    </div>

    <template id="site-card-template">
      <a class="site-card" target="_blank" rel="noreferrer">
        <div class="site-top">
          <img class="site-icon" alt="">
          <div class="site-text">
            <strong class="site-title"></strong>
            <span class="site-url"></span>
          </div>
        </div>
        <div class="site-meta">
          <span class="chip site-port"></span>
          <span class="chip site-code"></span>
          <span class="chip site-type"></span>
        </div>
        <p class="site-seen"></p>
      </a>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
